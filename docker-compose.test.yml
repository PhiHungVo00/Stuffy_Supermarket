version: '3.8'

services:
  backend-api-test:
    build:
      context: ./backend-api
    environment:
      - MONGO_URI=mongodb://mongodb-test:27017/stuffy_db
      - NODE_ENV=test
    depends_on:
      - mongodb-test
    command: >
      sh -c "npm install && npm run build && npm run dev & sleep 5 && npx ts-node test-shopee-parity-v8.ts"

  mongodb-test:
    image: mongo:latest
    ports:
      - "27018:27017"
