version: '3.8'

services:
  container:
    build:
      context: ./container
    ports:
      - "3000:80"

  header-app:
    build:
      context: ./header-app
    ports:
      - "3001:80"

  product-app:
    build:
      context: ./product-app
    ports:
      - "3002:80"

  cart-app:
    build:
      context: ./cart-app
    ports:
      - "3003:80"

  admin-app:
    build:
      context: ./admin-app
    ports:
      - "3004:80"

  store-app:
    build:
      context: ./store-app
    ports:
      - "3005:80"

  design-system-app:
    build:
      context: ./design-system-app
    ports:
      - "3006:80"

  profile-app:
    build:
      context: ./profile-app
    ports:
      - "3007:80"

  marketing-app:
    build:
      context: ./marketing-app
    ports:
      - "3008:80"

  support-app:
    build:
      context: ./support-app
    ports:
      - "3011:80"

  3d-viewer-app:
    build:
      context: ./3d-viewer-app
    ports:
      - "3012:80"

  # CORE BACKEND & BFF LAYER:
  backend-api:
    build:
      context: ./backend-api
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/stuffy_db?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://stuffy:stuffyypass@rabbitmq:5672
      - JWT_SECRET=${JWT_SECRET:-stuffy_jwt_secret_change_in_production}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  graphql-gateway:
    build:
      context: ./graphql-gateway
    ports:
      - "4000:4000"
    depends_on:
      - backend-api

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=stuffy
      - RABBITMQ_DEFAULT_PASS=stuffyypass
    volumes:
      - rabbit_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=password
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }"
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Web UI
      - "4318:4318"   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  recommendation-service:
    build:
      context: ./recommendation-service
    ports:
      - "3010:3010"
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBIT_URL=amqp://stuffy:stuffyypass@rabbitmq:5672
      - MONGO_URI=mongodb://mongodb:27017/stuffy_db
    depends_on:
      - redis
      - rabbitmq
      - mongodb

  image-service:
    build: ./image-service
    ports:
      - "3009:3009"
    volumes:
      - image_cache:/app/image-service/cache

volumes:
  mongo_data:
  redis_data:
  rabbit_data:
  postgres_data:
  image_cache:
