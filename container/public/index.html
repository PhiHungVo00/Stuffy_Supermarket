<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.onrender.com http://localhost:* https://maps.googleapis.com; object-src 'none'; base-uri 'self';">
  <style>
    :root {
      --primary-color: #4f46e5;
      --primary-dark: #3730a3;
      --secondary-color: #ec4899;
      --accent-color: #38bdf8;
      --bg-main: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-light: #e2e8f0;
      --radius-md: 12px;
      --radius-lg: 20px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
      --shadow-hover: 0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.05);
    }
    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .ds-button {
      background-color: var(--primary-color) !important;
      color: #ffffff !important;
    }
    .ds-glass-card {
      background-color: var(--bg-card) !important;
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Stuffy Supermarket - Hệ sinh thái Micro Frontends TMĐT hiện đại hàng đầu với tích hợp AI, Livestream bán hàng và Ví xu thông minh.">
  <title>Stuffy Supermarket - Micro Frontends</title>
  <script>
    // Khởi tạo config từ file JSON tại runtime
    // Điều này cho phép thay đổi URL của các MFE mà không cần build lại Container
    (function() {
      window._STUFFY_CONFIG_ = null;
      fetch('/config.json')
        .then(res => res.json())
        .then(config => {
          window._STUFFY_CONFIG_ = config;
        })
        .catch(err => {
          console.error('Không thể nạp config.json:', err);
          // Fallback object để tránh lỗi undefined
          window._STUFFY_CONFIG_ = {};
        });
    })();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
