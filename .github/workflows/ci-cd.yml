name: Micro Frontend CI/CD Pipeline

on:
  push:
    branches: ["main", "master", "Dev"]
  pull_request:
    branches: ["main", "master", "Dev"]

permissions:
  contents: write # Needed for GitOps commit
  packages: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.12-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cài đặt dependencies
        run: npm install

      - name: Linter Code
        run: npx turbo run lint

      - name: Chạy E2E Integration Tests
        env:
          MONGO_URI: mongodb://localhost:27017/stuffy_db
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://guest:guest@localhost:5672
        run: |
          cd backend-api
          npm run dev &
          sleep 12
          npx ts-node test-shopee-parity-v8.ts || true

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v4
      - name: Tìm các module thay đổi
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            header-app: 'header-app/**'
            product-app: 'product-app/**'
            cart-app: 'cart-app/**'
            admin-app: 'admin-app/**'
            container: 'container/**'
            store-app: 'store-app/**'
            design-system-app: 'design-system-app/**'
            3d-viewer-app: '3d-viewer-app/**'
            backend-api: 'backend-api/**'
            profile-app: 'profile-app/**'
            marketing-app: 'marketing-app/**'
            support-app: 'support-app/**'
            image-service: 'image-service/**'
            recommendation-service: 'recommendation-service/**'
            auth-service: 'auth-service/**'
            graphql-gateway: 'graphql-gateway/**'

  build-and-push-dockerhub:
    needs: [run-tests, detect-changes]
    # Chỉ chạy khi merge vào main/Dev (không chạy lúc PR) và CÓ sự thay đổi module
    if: github.event_name != 'pull_request' && needs.detect-changes.outputs.apps != '[]' && needs.detect-changes.outputs.apps != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v4

      - name: Đăng nhập vào GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Chuyển tên Owner sang chữ thường (Lowercase)
        run: echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Thiết lập Tags
        id: docker_meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          TAGS="ghcr.io/${{ env.OWNER_LC }}/stuffy-${{ matrix.app }}:latest,ghcr.io/${{ env.OWNER_LC }}/stuffy-${{ matrix.app }}:${SHA_SHORT}"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Thiết lập Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build và đẩy ảnh (Push Image)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          build-args: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          # Dùng cache của Github Actions để tăng tốc build
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy-to-render:
    needs: [build-and-push-dockerhub, detect-changes]
    if: success() && github.event_name != 'pull_request' && needs.detect-changes.outputs.apps != '[]' && needs.detect-changes.outputs.apps != ''
    runs-on: ubuntu-latest
    steps:
      - name: Kích hoạt Webhook Deploy của Render
        env:
          APPS_JSON: ${{ needs.detect-changes.outputs.apps }}
          HOOK_header-app: ${{ secrets.RENDER_DEPLOY_HOOK_HEADER }}
          HOOK_product-app: ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCT }}
          HOOK_cart-app: ${{ secrets.RENDER_DEPLOY_HOOK_CART }}
          HOOK_admin-app: ${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }}
          HOOK_container: ${{ secrets.RENDER_DEPLOY_HOOK_CONTAINER }}
          HOOK_store-app: ${{ secrets.RENDER_DEPLOY_HOOK_STORE }}
          HOOK_design-system-app: ${{ secrets.RENDER_DEPLOY_HOOK_DESIGN_SYSTEM }}
          HOOK_3d-viewer-app: ${{ secrets.RENDER_DEPLOY_HOOK_VIEWER }}
          HOOK_backend-api: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
          HOOK_profile-app: ${{ secrets.RENDER_DEPLOY_HOOK_PROFILE }}
          HOOK_marketing-app: ${{ secrets.RENDER_DEPLOY_HOOK_MARKETING }}
          HOOK_support-app: ${{ secrets.RENDER_DEPLOY_HOOK_SUPPORT }}
          HOOK_image-service: ${{ secrets.RENDER_DEPLOY_HOOK_IMAGE }}
          HOOK_recommendation-service: ${{ secrets.RENDER_DEPLOY_HOOK_RECOM }}
          HOOK_auth-service: ${{ secrets.RENDER_DEPLOY_HOOK_AUTH }}
          HOOK_graphql-gateway: ${{ secrets.RENDER_DEPLOY_HOOK_GATEWAY }}
        run: |
          echo "Changed apps: $APPS_JSON"
          
          # Lặp qua từng app thay đổi và gọi webhook tương ứng
          for app in $(echo $APPS_JSON | jq -r '.[]'); do
            hook_url=$(printenv "HOOK_$app")
            if [ -n "$hook_url" ]; then
              echo "Triggering deploy for $app..."
              curl -X POST -s "$hook_url" > /dev/null || true
            else
              echo "No webhook configured for $app"
            fi
          done
