name: Micro Frontend CI/CD Pipeline

on:
  push:
    branches: ["main", "master", "Dev"]
  pull_request:
    branches: ["main", "master", "Dev"]

permissions:
  contents: read
  packages: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.12-management
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cài đặt dependencies
        run: npm ci

      - name: Chạy E2E Integration Tests
        env:
          MONGO_URI: mongodb://localhost:27017/stuffy_db
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://guest:guest@localhost:5672
        run: |
          cd backend-api
          npm run dev &
          sleep 12
          node test-shopee-ev2.js

  build-and-push-dockerhub:
    needs: run-tests
    runs-on: ubuntu-latest
    # Dùng tính năng matrix để lặp lại việc build tự động cho toàn bộ MFE + Backend
    strategy:
      matrix:
        app: [header-app, product-app, cart-app, admin-app, container, store-app, design-system-app, 3d-viewer-app, backend-api, profile-app, marketing-app, support-app, image-service, recommendation-service, graphql-gateway]

    steps:
      - name: Tải mã nguồn
        uses: actions/checkout@v4

      - name: Đăng nhập vào GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Đăng nhập vào Docker Hub
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/Dev')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Chuyển tên Owner sang chữ thường (Lowercase)
        run: echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Thiết lập Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build và đẩy ảnh (Push Image)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.app }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          # Đẩy lên cả GHCR (Không bao giờ bị giới hạn) và Docker Hub
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/stuffy-${{ matrix.app }}:latest
            ${{ secrets.DOCKER_USERNAME }}/stuffy-${{ matrix.app }}:latest
          # Truyền Gemini API Key
          build-args: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          # Dùng cache của Github Actions để tránh kéo Image từ Docker Hub quá nhiều lần
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy-to-render:
    needs: build-and-push-dockerhub
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/Dev'
    runs-on: ubuntu-latest
    steps:
      - name: Kích hoạt Webhook Deploy của Render
        run: |
          echo "Kích hoạt tự động cập nhật Web server Render từ Github Actions..."
          
          # Hàm để trigger deploy nếu secret tồn tại
          trigger_deploy() {
            if [[ -n "$1" ]]; then
              echo "Deploying to hook: ${1:0:10}..."
              curl -X POST -s "$1" > /dev/null || true
            fi
          }

          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_CONTAINER }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_HEADER }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_PRODUCT }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_CART }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_ADMIN }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_STORE }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_DESIGN_SYSTEM }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_VIEWER }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_PROFILE }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_MARKETING }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_SUPPORT }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_IMAGE }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_RECOM }}"
          trigger_deploy "${{ secrets.RENDER_DEPLOY_HOOK_GATEWAY }}"
